name: Data Collection and Processing Pipeline

on:
  schedule:
    - cron: '0 17 * * *'  # Runs at 2:00 AM KST daily (17:00 UTC)
  workflow_dispatch:      # Allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run data collection and processing script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python collect_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          # Commit only if there are changes
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "data: auto-update vacancy feeds [skip ci]"
            git push
          else
            echo "No changes in data feeds to commit."
          fi
